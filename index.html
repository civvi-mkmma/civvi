<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contrôle ESP32-C3</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f0f0f0; }
        .controls { margin-bottom: 20px; padding: 10px; background: white; border-radius: 8px; }
        input[type="text"] { width: 70%; padding: 8px; }
        button { padding: 8px 15px; cursor: pointer; }
        
        /* Style pour les lignes du téléprompteur */
        #prompters { display: flex; flex-direction: column; gap: 10px; }
        .esp-line { 
            background: #222; 
            color: #fff; 
            padding: 15px; 
            border-radius: 5px; 
            overflow: hidden; 
            white-space: nowrap; 
            position: relative;
            font-size: 24px;
        }
        
        /* L'animation de défilement doux */
        .scrolling-text {
            display: inline-block;
            padding-left: 100%;
            animation: scroll-left 15s linear infinite;
        }
        
        @keyframes scroll-left {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }
    </style>
</head>
<body>

    <div class="controls">
        <button id="btnConnect">1. Connecter l'ESP (USB)</button>
        <hr>
        <input type="text" id="inputMessage" placeholder="Écrivez votre message (>256 caractères acceptés)...">
        <button id="btnSend">2. Envoyer à l'ESP</button>
    </div>

    <h3>Messages en direct (Téléprompteur) :</h3>
    <div id="prompters">
        </div>

    <script>
        let port;
        let writer;

        // 1. CONNEXION USB
        document.getElementById('btnConnect').addEventListener('click', async () => {
            try {
                // Demande l'accès au port série (Fenêtre Chrome)
                port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 });
                alert("ESP32 Connecté !");
                lirePortUSB(); // Lance l'écoute
            } catch (err) {
                console.error("Erreur de connexion:", err);
                alert("Connexion annulée ou échouée.");
            }
        });

        // 2. ENVOI DU TEXTE
        document.getElementById('btnSend').addEventListener('click', async () => {
            if (!port) { alert("Connectez l'ESP d'abord !"); return; }
            const texte = document.getElementById('inputMessage').value;
            const commande = "WRITE:" + texte + "\n"; // Ajoute le saut de ligne obligatoire
            
            const encoder = new TextEncoder();
            writer = port.writable.getWriter();
            await writer.write(encoder.encode(commande));
            writer.releaseLock();
            document.getElementById('inputMessage').value = ""; // Vide le champ
        });

        // 3. LECTURE CONTINUE ET AFFICHAGE
        async function lirePortUSB() {
            const decoder = new TextDecoderStream();
            const inputDone = port.readable.pipeTo(decoder.writable);
            const reader = decoder.readable.getReader();
            let donneesEnAttente = "";

            while (true) {
                const { value, done } = await reader.read();
                if (done) break;
                
                donneesEnAttente += value;
                let lignes = donneesEnAttente.split('\n');
                donneesEnAttente = lignes.pop(); // Garde le bout de ligne incomplet pour la suite

                for (let ligne of lignes) {
                    ligne = ligne.trim();
                    // Si on reçoit bien un message d'un ESP distant
                    if (ligne.startsWith("REMOTE_DATA:")) {
                        // Extraction (Format attendu : REMOTE_DATA:ID_MAC:Le texte...)
                        let contenu = ligne.substring(12); 
                        let separateurIndex = contenu.indexOf(":");
                        if(separateurIndex !== -1) {
                            let idEsp = contenu.substring(0, separateurIndex);
                            let texteEsp = contenu.substring(separateurIndex + 1);
                            mettreAJourAffichage(idEsp, texteEsp);
                        }
                    }
                }
            }
        }

        // 4. CRÉATION / MISE À JOUR DES LIGNES
        function mettreAJourAffichage(id, texte) {
            let conteneur = document.getElementById('prompters');
            let ligneEsp = document.getElementById("esp-" + id);

            // Si cet ESP n'a pas encore de ligne, on la crée
            if (!ligneEsp) {
                ligneEsp = document.createElement('div');
                ligneEsp.id = "esp-" + id;
                ligneEsp.className = "esp-line";
                
                let texteAnim = document.createElement('div');
                texteAnim.className = "scrolling-text";
                texteAnim.id = "text-" + id;
                
                ligneEsp.appendChild(texteAnim);
                conteneur.appendChild(ligneEsp);
            }

            // Mise à jour du texte (si différent pour éviter de relancer l'animation inutilement)
            let texteElement = document.getElementById("text-" + id);
            if (texteElement.innerText !== "ESP " + id + " : " + texte) {
                texteElement.innerText = "ESP " + id + " : " + texte;
            }
        }
    </script>
</body>
</html>
